<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Github Pharmacy</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="../home.css">
    <script src="i18n.js"></script>
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar__header">
            <div class="sidebar__logo-dot"></div>
            <div class="sidebar__title">G-PHARMA ADMIN</div>
        </div>
        <nav class="sidebar__nav">
            <a href="sales" class="nav-item" data-i18n="admin.sales_title">📊 Sales & Revenue</a>
            <a href="users" class="nav-item active" data-i18n="admin.user_title">👥 User Management</a>
            <a href="../home.html" class="nav-item" data-i18n="admin.nav_website">🌐 View Website</a>
        </nav>
        <div class="sidebar__footer">
            <a href="../logout" class="nav-item" style="color: #ef4444; text-decoration: none;"
                data-i18n="common.nav_logout">🚪 Logout</a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <header class="content-header">
            <div class="breadcrumb" style="font-size: 0.9rem; color: #64748b;">Admin / <b style="color: #1e293b;"
                    data-i18n="admin.user_title">User Management</b></div>
            <div class="header-user">
                <span class="badge-admin">BACKOFFICE</span>
                <span id="totalUsers" class="badge-admin"
                    style="background: #e0e7ff; color: #4338ca; border-color: #c7d2fe; margin-left: 8px;">0 Users</span>
            </div>
        </header>

        <section class="content-body">
            <!-- ADD FORM -->
            <div class="card" style="margin-bottom: 2rem;">
                <h2 style="margin-bottom: 1.5rem; font-size: 1.25rem;" data-i18n="admin.lbl_create_acc">✨ Create New
                    Account</h2>
                <div
                    style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem;">
                    <div class="field">
                        <span style="font-weight:600; font-size: 0.8rem; color: #64748b;"
                            data-i18n="admin.lbl_fullname">Full Name</span>
                        <input type="text" id="addFullName" data-i18n-placeholder="admin.lbl_fullname"
                            style="padding: 0.6rem; border: 1px solid #e2e8f0; border-radius: 8px;">
                    </div>
                    <div class="field">
                        <span style="font-weight:600; font-size: 0.8rem; color: #64748b;"
                            data-i18n="admin.lbl_user">Username</span>
                        <input type="text" id="addUsername" data-i18n-placeholder="admin.lbl_user"
                            style="padding: 0.6rem; border: 1px solid #e2e8f0; border-radius: 8px;">
                    </div>
                    <div class="field">
                        <span style="font-weight:600; font-size: 0.8rem; color: #64748b;"
                            data-i18n="admin.lbl_pass">Password</span>
                        <div style="position: relative;">
                            <input type="password" id="addPassword" data-i18n-placeholder="admin.lbl_pass"
                                style="padding: 0.6rem; border: 1px solid #e2e8f0; border-radius: 8px; width: 100%;">
                            <button type="button" id="togglePassword"
                                style="position: absolute; right: 10px; top: 8px; background:none; border:none; cursor:pointer;">👁️</button>
                        </div>
                    </div>
                    <div class="field">
                        <span style="font-weight:600; font-size: 0.8rem; color: #64748b;"
                            data-i18n="admin.lbl_access_level">Access Level</span>
                        <select id="addRole" style="padding: 0.6rem; border: 1px solid #e2e8f0; border-radius: 8px;">
                            <option value="CUSTOMER" data-i18n="admin.lbl_customer">👤 CUSTOMER</option>
                            <option value="ADMIN" data-i18n="admin.lbl_admin">🛡️ ADMIN</option>
                        </select>
                    </div>
                </div>

                <div style="background: #f8fafc; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem;"
                    id="pwdRules">
                    <div style="display: flex; gap: 15px; font-size: 0.75rem;">
                        <span class="rule-item" data-rule="len">⚪ <span data-i18n="admin.lbl_min_chars">Min 8
                                chars</span></span>
                        <span class="rule-item" data-rule="upper">⚪ <span data-i18n="admin.lbl_upper_case">Upper
                                case</span></span>
                        <span class="rule-item" data-rule="lower">⚪ <span data-i18n="admin.lbl_lower_case">Lower
                                case</span></span>
                        <span class="rule-item" data-rule="num">⚪ <span
                                data-i18n="admin.lbl_numbers">Numbers</span></span>
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end;">
                    <button class="btn-admin btn-admin--primary" id="btnSubmitUser"
                        data-i18n="admin.btn_create_acc">Create Account</button>
                </div>
            </div>

            <!-- USER LIST -->
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="margin: 0; font-size: 1.25rem;" data-i18n="admin.lbl_account_directory">📋 Account
                        Directory</h2>
                    <input type="text" id="userSearch" data-i18n-placeholder="admin.lbl_search_accounts_placeholder"
                        style="padding: 0.6rem; border: 1px solid #e2e8f0; border-radius: 8px; width: 250px;">
                </div>

                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th data-i18n="admin.header_id">ID</th>
                                <th data-i18n="admin.header_profile">User Profile</th>
                                <th data-i18n="admin.header_role">Role</th>
                                <th style="text-align: right;" data-i18n="admin.header_operations">Operations</th>
                            </tr>
                        </thead>
                        <tbody id="userList">
                            <!-- JS populated -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <style>
        .user-name-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.8rem;
            color: #1e293b;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        .badge--admin {
            background: #fee2e2;
            color: #ef4444;
            border: 1px solid #fecaca;
        }

        .badge--customer {
            background: #ecfdf5;
            color: #10b981;
            border: 1px solid #d1fae5;
        }

        .btn-action {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-delete {
            background: #fee2e2;
            color: #ef4444;
        }

        .btn-delete:hover {
            background: #ef4444;
            color: white;
        }

        .rule-item.valid {
            color: #10b981;
            font-weight: 700;
        }

        .rule-item.invalid {
            color: #ef4444;
        }

        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
        }

        .toast {
            background: #1e293b;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            margin-top: 0.5rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>

    <div id="toastContainer" class="toast-container"></div>

    <script>
        const $ = (id) => document.getElementById(id);

        function showToast(msg, type = 'success') {
            const container = $('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = (type === 'success' ? '✅' : '❌') + ` <span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Security Validation
        function checkPassword(p) {
            return {
                len: p.length >= 8,
                upper: /[A-Z]/.test(p),
                lower: /[a-z]/.test(p),
                num: /[0-9]/.test(p)
            };
        }

        function updatePwdUI() {
            const p = $('addPassword').value;
            const res = checkPassword(p);
            const items = document.querySelectorAll('.rule-item');

            items.forEach(item => {
                const rule = item.dataset.rule;
                if (res[rule]) {
                    item.classList.add('valid');
                    item.classList.remove('invalid');
                    item.innerHTML = '✅ ' + item.innerHTML.substring(2);
                } else {
                    item.classList.remove('valid');
                    item.classList.add('invalid');
                    item.innerHTML = '❌ ' + item.innerHTML.substring(2);
                }
            });
            return Object.values(res).every(v => v);
        }

        $('addPassword').addEventListener('input', updatePwdUI);

        async function loadUsers() {
            try {
                const res = await fetch('users?action=list');
                let users = await res.json();

                const query = $('userSearch').value.toLowerCase();
                if (query) {
                    users = users.filter(u =>
                        u.fullName.toLowerCase().includes(query) ||
                        u.username.toLowerCase().includes(query)
                    );
                }

                $('totalUsers').textContent = users.length + ' ' + (t('admin', 'nav_users') || 'Users');
                const tbody = $('userList');
                tbody.innerHTML = users.map(u => `
                    <tr>
                        <td style="font-weight: 700;">#${u.id}</td>
                        <td>
                            <div class="user-name-cell">
                                <div class="user-avatar">${u.fullName.charAt(0).toUpperCase()}</div>
                                <div>
                                    <div style="font-weight: 700; color: #1e293b;">${u.fullName}</div>
                                    <div style="font-size: 0.8rem; color: #64748b;">@${u.username}</div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span class="badge ${u.role === 'ADMIN' ? 'badge--admin' : 'badge--customer'}">
                                ${u.role === 'ADMIN' ? t('admin', 'role_admin_badge') : t('admin', 'role_member_badge')}
                            </span>
                        </td>
                        <td style="text-align: right; display: flex; gap: 8px; justify-content: flex-end;">
                            <button class="btn-action" style="background: ${u.role === 'ADMIN' ? '#fee2e2' : '#dcfce7'}; color: ${u.role === 'ADMIN' ? '#ef4444' : '#10b981'};" 
                                title="${u.role === 'ADMIN' ? t('admin', 'btn_demote') : t('admin', 'btn_promote')}" 
                                onclick="toggleRole(${u.id}, '${u.role}')">
                                ${u.role === 'ADMIN' ? '⬇️' : '⬆️'}
                            </button>
                            <button class="btn-action btn-delete" title="${t('admin', 'btn_delete')}" onclick="deleteUser(${u.id})">
                                🗑️
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error(e);
            }
        }

        $('btnSubmitUser').addEventListener('click', async () => {
            const fullName = $('addFullName').value;
            const username = $('addUsername').value;
            const password = $('addPassword').value;
            const role = $('addRole').value;

            if (!fullName || !username || !password) {
                showToast(t('admin', 'msg_fill_info'), 'error');
                return;
            }

            if (!updatePwdUI()) {
                showToast(t('admin', 'msg_weak_pass'), 'error');
                return;
            }

            const params = new URLSearchParams();
            params.append('action', 'add');
            params.append('fullName', fullName);
            params.append('username', username);
            params.append('password', password);
            params.append('role', role);

            const res = await fetch('users', { method: 'POST', body: params });
            if (await res.text() === 'OK') {
                showToast(t('login', 'msg_success'));
                $('addFullName').value = '';
                $('addUsername').value = '';
                $('addPassword').value = '';
                updatePwdUI();
                loadUsers();
            } else {
                showToast(t('admin', 'msg_account_exists'), 'error');
            }
        });

        async function deleteUser(id) {
            if (!confirm(t('admin', 'msg_confirm_delete'))) return;

            const params = new URLSearchParams();
            params.append('action', 'delete');
            params.append('id', id);

            const res = await fetch('users', { method: 'POST', body: params });
            if (await res.text() === 'OK') {
                showToast(t('admin', 'msg_delete_success'));
                loadUsers();
            } else {
                showToast(t('admin', 'msg_delete_error'), 'error');
            }
        }

        async function toggleRole(id, currentRole) {
            const newRole = currentRole === 'ADMIN' ? 'CUSTOMER' : 'ADMIN';
            const confirmMsg = newRole === 'ADMIN' ? t('admin', 'msg_confirm_promote') : t('admin', 'msg_confirm_demote');

            if (!confirm(confirmMsg)) return;

            const params = new URLSearchParams();
            params.append('action', 'updateRole');
            params.append('id', id);
            params.append('role', newRole);

            const res = await fetch('users', { method: 'POST', body: params });
            if (await res.text() === 'OK') {
                showToast(newRole === 'ADMIN' ? t('admin', 'btn_promote') : t('admin', 'btn_demote'));
                loadUsers();
            } else {
                showToast(t('admin', 'msg_update_error'), 'error');
            }
        }

        $('userSearch').addEventListener('input', loadUsers);
        loadUsers();

        // Password Toggle Logic
        const togglePassword = $('togglePassword');
        const passwordInput = $('addPassword');

        if (togglePassword && passwordInput) {
            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.textContent = type === 'password' ? '👁️' : '🙈';
            });
        }
    </script>
</body>

</html>
