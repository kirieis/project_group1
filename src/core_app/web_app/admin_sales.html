<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Dashboard - Github Pharmacy</title>
    <link rel="stylesheet" href="../admin.css">
    <script src="../i18n.js"></script>
    <script>
        // Admin pages should always be in Vietnamese as per user request
        if (typeof setLanguage === 'function') setLanguage('vi');
    </script>
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar__header">
            <div class="sidebar__logo">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <div class="sidebar__title">Github Pharmacy</div>
        </div>
        <nav class="sidebar__nav">
            <a href="sales" class="nav-item active" data-i18n="admin.sales_title">📊 Doanh thu & Tiền lời</a>
            <a href="users" class="nav-item" data-i18n="admin.user_title">👥 Quản lý người dùng</a>
            <a href="../home.html" class="nav-item" data-i18n="admin.nav_website">🌐 Xem website</a>
        </nav>
        <div class="sidebar__footer">
            <a href="../logout" class="nav-item" style="color: #ef4444; text-decoration: none;"
                data-i18n="common.nav_logout">🚪 Đăng xuất</a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
        <header class="content-header">
            <div class="breadcrumb" style="font-size: 0.9rem; color: #64748b;">Admin / <b style="color: #1e293b;"
                    data-i18n="admin.sales_title">Sales Dashboard</b></div>
            <div class="header-user">
                <span class="badge-admin">BACKOFFICE</span>
                <span id="adminName" style="font-weight: 600;">Administrator</span>
            </div>
        </header>

        <section class="content-body">
            <div class="stats-grid">
                <div class="stat-card stat-card--orders">
                    <span class="stat-card__icon">📦</span>
                    <div class="stat-card__label" data-i18n="admin.lbl_orders">ĐƠN ĐÃ TRẢ</div>
                    <div id="statOrders" class="stat-card__value">0</div>
                </div>
                <div class="stat-card stat-card--revenue">
                    <span class="stat-card__icon">💰</span>
                    <div class="stat-card__label" data-i18n="admin.lbl_revenue">DOANH THU</div>
                    <div id="statRevenue" class="stat-card__value">0đ</div>
                </div>
                <div class="stat-card stat-card--profit">
                    <span class="stat-card__icon">📈</span>
                    <div class="stat-card__label" data-i18n="admin.lbl_profit">LỢI NHUẬN GỘP</div>
                    <div id="statProfit" class="stat-card__value">0đ</div>
                </div>
            </div>

            <div class="card">
                <div class="page-header"
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2 style="margin:0; font-size: 1.25rem;" data-i18n="admin.lbl_recent">Giao dịch gần đây</h2>
                    <div class="search-bar" style="display: flex; gap: 12px; align-items: center;">
                        <input type="date" id="dateFrom" onchange="renderTable()"
                            style="padding: 0.6rem; border: 1px solid var(--admin-border); border-radius: 10px;">
                        <input type="date" id="dateTo" onchange="renderTable()"
                            style="padding: 0.6rem; border: 1px solid var(--admin-border); border-radius: 10px;">
                        <input type="text" id="searchTerm" data-i18n-placeholder="admin.lbl_search_placeholder"
                            oninput="renderTable()"
                            style="padding: 0.6rem; border: 1px solid var(--admin-border); border-radius: 10px; width: 280px;">
                        <button onclick="loadSales()" class="btn-admin btn-admin--primary"
                            data-i18n="admin.btn_refresh">Làm mới</button>
                    </div>
                </div>

                <div class="table-container" style="overflow-x: auto;">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th data-i18n="admin.header_id">MÃ ĐƠN</th>
                                <th data-i18n="admin.header_date">NGÀY</th>
                                <th data-i18n="admin.header_buyer">NGƯỜI MUA</th>
                                <th data-i18n="admin.header_method">PTTT</th>
                                <th data-i18n="admin.header_total">TỔNG TIỀN</th>
                                <th data-i18n="admin.header_profit">LỢI NHUẬN</th>
                                <th data-i18n="admin.header_status">TRẠNG THÁI</th>
                                <th data-i18n="admin.header_action">THAO TÁC</th>
                            </tr>
                        </thead>
                        <tbody id="salesList">
                            <!-- JS populated -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <style>
        .detail-row {
            display: none;
            background: #f8fafc;
        }

        .detail-row.active {
            display: table-row;
        }

        .items-list {
            padding: 1.5rem;
            background: #f1f5f9;
            border-radius: 12px;
            margin: 10px;
        }

        .item-line {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #cbd5e1;
        }

        .total-cell {
            color: #6366f1;
            font-weight: 700;
        }

        .profit-cell {
            color: #10b981;
            font-weight: 700;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .btn-view {
            padding: 5px 12px;
            background: #e0e7ff;
            color: #4f46e5;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>

    <script>
        function formatVND(n) {
            return n.toLocaleString("vi-VN") + "đ";
        }

        let allOrders = [];

        async function loadSales() {
            try {
                console.log("DEBUG: Fetching sales data from ../api/orders?action=all");
                const res = await fetch('../api/orders?action=all');
                if (!res.ok) {
                    console.error("DEBUG: Fetch failed with status", res.status);
                    alert(window.t ? t('login', 'msg_unauthorized') : "Login required!");
                    window.location.href = "../login.html";
                    return;
                }
                allOrders = await res.json();
                renderTable();
            } catch (e) {
                console.error(e);
            }
        }

        function renderTable() {
            const searchTerm = document.getElementById('searchTerm').value.toLowerCase();
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;

            const filteredOrders = allOrders.filter(order => {
                // Search filter
                const buyerName = order.customerName || t('admin', 'guest_customer');
                const matchesSearch = buyerName.toLowerCase().includes(searchTerm) ||
                    order.id.toString().includes(searchTerm);

                // Date filter
                const orderDate = new Date(order.year, order.month - 1, order.day);
                let matchesDate = true;
                if (dateFrom) {
                    const from = new Date(dateFrom);
                    from.setHours(0, 0, 0, 0);
                    matchesDate = matchesDate && (orderDate >= from);
                }
                if (dateTo) {
                    const to = new Date(dateTo);
                    to.setHours(23, 59, 59, 999);
                    matchesDate = matchesDate && (orderDate <= to);
                }

                return matchesSearch && matchesDate;
            });

            let totalRev = 0;
            let totalProfit = 0;

            const tbody = document.getElementById('salesList');
            tbody.innerHTML = filteredOrders.map(order => {
                let orderProfit = 0;
                order.items.forEach(item => {
                    const cost = item.importPrice || (item.price * 0.7);
                    orderProfit += (item.price - cost) * item.qty;
                });

                if (order.status === 'PAID') {
                    totalRev += order.total;
                    totalProfit += orderProfit;
                }

                const methodLabel = order.method === 'BANK_TRANSFER' ? 'Chuyển khoản' : (order.method === 'SEPAY' ? 'Cổng SEPAY' : order.method);
                const methodClass = order.method === 'BANK_TRANSFER' ? 'badge-pending' : 'badge-paid';

                return `
                    <tr>
                        <td style="font-weight: 700; color: var(--admin-primary);">#${order.id}</td>
                        <td style="color: var(--admin-muted); font-size: 0.85rem;">${order.day}/${order.month}/${order.year}</td>
                        <td style="font-weight: 700; color: var(--admin-primary);">${order.customerName || t('admin', 'guest_customer')}</td>
                        <td><span class="badge ${methodClass}">${methodLabel}</span></td>
                        <td class="total-cell" style="color: var(--admin-accent);">${formatVND(order.total)}</td>
                        <td class="profit-cell" style="color: var(--admin-success); font-weight: 700;">+${formatVND(orderProfit)}</td>
                        <td>
                            ${order.status === 'PAID' ?
                        `<span class="badge badge-paid">✅ ${t('admin', 'status_paid') || 'Đã thanh toán'}</span>` :
                        order.status === 'CANCELLED' ?
                            `<span class="badge badge-cancelled">❌ ${t('admin', 'status_cancelled') || 'Đã hủy'}</span>` :
                            `<span class="badge badge-pending">⏳ ${t('admin', 'status_pending') || 'Chờ duyệt'}</span>`}
                        </td>
                        <td><button class="btn-view" onclick="toggleDetails(${order.id})">👁️</button></td>
                    </tr>
                    <tr id="details-${order.id}" class="detail-row">
                        <td colspan="8">
                            <div class="items-list">
                                <div style="font-weight: 700; margin-bottom: 0.5rem; display: flex; justify-content: space-between;">
                                    <span>${t('admin', 'lbl_items_in_order')}</span>
                                    <span>${t('admin', 'lbl_gross_profit')}</span>
                                </div>
                                ${order.items.map(item => {
                                const itemCost = item.importPrice || (item.price * 0.7);
                                const itemProfit = (item.price - itemCost) * item.qty;
                                return `
                                    <div class="item-line">
                                        <span>${item.name} (x${item.qty})</span>
                                        <span class="item-profit">+${formatVND(itemProfit)}</span>
                                    </div>
                                    `;
                            }).join('')}
                            </div>
                            <div style="margin-top: 1rem; display: flex; gap: 1rem; align-items: flex-start;">
                                ${order.paymentProof ? `
                                    <div style="flex: 1;">
                                        <p style="font-weight: 700; font-size: 0.8rem; margin-bottom: 0.5rem;">📸 ${t('admin', 'lbl_payment_proof')}:</p>
                                        <img src="${order.paymentProof}" style="max-width: 200px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer;" onclick="window.open(this.src)">
                                    </div>
                                ` : `<div style="flex: 1; color: #94a3b8; font-style: italic; font-size: 0.8rem;">(${t('checkout', 'not_received_yet')})</div>`}
                                
                                <div style="text-align: right; display: flex; gap: 10px; justify-content: flex-end;">
                                    ${order.status === 'PENDING' ? `
                                        <button onclick="updateOrderStatus(${order.id}, 'CANCELLED')" 
                                            style="background: #ef4444; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 0.75rem; font-weight: 700; cursor: pointer;">
                                            ❌ ${t('admin', 'btn_reject')}
                                        </button>
                                        <button onclick="updateOrderStatus(${order.id}, 'PAID')" 
                                            style="background: #10b981; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 0.75rem; font-weight: 700; cursor: pointer;">
                                            💰 ${t('admin', 'btn_approve')}
                                        </button>
                                    ` : order.status === 'PAID' ?
                        `<span style="color: #10b981; font-weight: 700; background: #ecfdf5; padding: 0.5rem 1rem; border-radius: 0.5rem;">✅ ${t('admin', 'status_paid')}</span>` :
                        `<span style="color: #ef4444; font-weight: 700; background: #fef2f2; padding: 0.5rem 1rem; border-radius: 0.5rem;">🚫 ${t('admin', 'status_cancelled')}</span>`}
                                </div>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            document.getElementById('statOrders').textContent = filteredOrders.length;
            document.getElementById('statRevenue').textContent = formatVND(totalRev);
            document.getElementById('statProfit').textContent = formatVND(totalProfit);
        }

        window.toggleDetails = (id) => {
            const row = document.getElementById(`details-${id}`);
            row.classList.toggle('active');
        };

        async function updateOrderStatus(orderId, newStatus) {
            if (!confirm(t('admin', 'msg_confirm_approve'))) return;

            try {
                const res = await fetch('../api/orders', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ orderId: orderId, status: newStatus })
                });

                if (res.ok) {
                    alert(t('admin', 'msg_update_success'));
                    loadSales(); // Reload data
                } else {
                    const err = await res.json();
                    alert(t('admin', 'msg_update_error') + ': ' + err.message);
                }
            } catch (e) {
                console.error(e);
                alert(t('admin', 'msg_update_error'));
            }
        }



        loadSales();
    </script>
</body>

</html>
