<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GITHUB PHARMACY - CORE SYSTEM GATE</title>
    <style>
        :root {
            --bg: #050a10;
            --primary: #c9a227;
            --danger: #dc2626;
            --text: #e2e8f0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-box {
            background: rgba(10, 20, 30, 0.8);
            border: 1px solid var(--primary);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(201, 162, 39, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 24px;
            margin: 0;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.6;
            text-transform: uppercase;
        }

        .field {
            margin-bottom: 20px;
            text-align: left;
        }

        .field label {
            display: block;
            font-size: 11px;
            color: var(--primary);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .field input {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .field input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #050a10;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(201, 162, 39, 0.4);
        }

        .error-msg {
            color: var(--danger);
            font-size: 13px;
            margin-top: 15px;
            display: none;
            background: rgba(220, 38, 36, 0.1);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--danger);
        }

        .field-wrap {
            position: relative;
        }

        .toggle-pass {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.6;
            font-size: 18px;
        }

        .toggle-pass:hover {
            opacity: 1;
        }
    </style>
</head>

<body>
    <div id="notification-banner" class="notif-banner">
        <div class="notif-content">
            <span class="notif-icon">🔔</span>
            <span id="notification-text"></span>
            <button class="notif-close" onclick="document.getElementById('notification-banner').style.display='none'">✕</button>
        </div>
    </div>
    <style>
        .notif-banner {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            color: white;
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.4);
            animation: notifSlideDown 0.5s ease;
        }
        .notif-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 600;
        }
        .notif-icon {
            font-size: 20px;
            animation: notifBell 1s ease infinite;
        }
        .notif-close {
            margin-left: auto;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .notif-close:hover { background: rgba(255,255,255,0.35); }
        @keyframes notifSlideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes notifBell {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            50% { transform: rotate(-15deg); }
            75% { transform: rotate(5deg); }
        }
    </style>
    <div class="login-box">
        <div class="header">
            <h1>SYSTEM ACCESS</h1>
            <p>Github Pharmacy Management Portal</p>
        </div>
        <form action="./admin/auth" method="POST" onsubmit="return handleAuth(event)">
            <div class="field">
                <label>Admin Access Key</label>
                <input type="text" id="userInput" name="user" required autocomplete="off" placeholder="Tên quản trị...">
            </div>
            <div class="field">
                <label>Security Code</label>
                <div class="field-wrap">
                    <input type="password" id="passInput" name="pass" required placeholder="Mật khẩu bảo mật...">
                    <span class="toggle-pass" onclick="togglePass()">👁️</span>
                </div>
            </div>
            <button type="submit" class="btn">Authorize Access</button>
            <div id="error" class="error-msg">⚠️ Quyền truy cập bị từ chối. Sai thông tin hoặc không đủ thẩm quyền.
            </div>
        </form>
    </div>

    <!-- Script to show error if redirect from servlet -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            fetch('./api/notification')
                .then(res => res.json())
                .then(data => {
                    if (data && data.hasNotification) {
                        document.getElementById('notification-text').innerText = data.message;
                        document.getElementById('notification-banner').style.display = 'block';
                        // Auto-hide after the remaining time (server tells us how many ms left)
                        if (data.remainingMs && data.remainingMs > 0) {
                            setTimeout(() => {
                                const banner = document.getElementById('notification-banner');
                                if (banner) banner.style.display = 'none';
                            }, data.remainingMs);
                        }
                    }
                })
                .catch(err => console.error("Error fetching notification:", err));
        });

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            const errDiv = document.getElementById('error');
            errDiv.style.display = 'block';
            if (urlParams.get('error') === 'role') {
                errDiv.innerHTML = '⚠️ Đúng mật khẩu nhưng <b>không có quyền Admin</b>!';
            } else {
                errDiv.innerHTML = '⚠️ Sai <b>Tên truy cập</b> hoặc <b>Mật mã</b>.';
            }
        }

        function handleAuth(e) {
            const u = document.getElementById('userInput');
            const p = document.getElementById('passInput');
            u.value = u.value.trim();
            p.value = p.value.trim();
            console.log("Authorizing:", u.value);
            return true;
        }

        function togglePass() {
            const input = document.getElementById('passInput');
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>

</html>
